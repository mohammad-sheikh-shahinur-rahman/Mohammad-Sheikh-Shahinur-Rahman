name: Generate GitHub Contribution Snake

on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন 00:00 UTC তে রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake from GitHub Contribution Grid
        uses: Platane/snk@v3.4.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: ./output/github-contribution-grid-snake.svg
          background: '00000000' # Transparent background
          color: '00BFA6'       # Snake color
          stroke: 5
          width: 800
          height: 200

      - name: Commit SVG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./output/github-contribution-grid-snake.svg
          git commit -m "Update contribution snake" || echo "No changes to commit"
          git push
