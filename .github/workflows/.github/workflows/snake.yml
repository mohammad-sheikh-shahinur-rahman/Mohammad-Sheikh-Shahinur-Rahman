name: Generate Snake Contribution Grid

on:
  schedule:
    - cron: "0 0 * * *"  # প্রতিদিন মধ্যরাতে রান করবে
  workflow_dispatch:     # ম্যানুয়ালি ট্রিগার করার অপশন

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # ⚠️ গুরুত্বপূর্ণ: ফাইল পুশ করার জন্য
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Snake Animation
        uses: Platane/snk@v3  # লেটেস্ট ভার্সন [[13]]
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push to Output Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output  # আপনার README-এ এই ব্রাঞ্চ ব্যবহার করুন
